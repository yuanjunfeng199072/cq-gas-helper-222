<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="重庆加油优惠情报站 - 快速找到附近最优惠加油站">
  <meta name="theme-color" content="#1d4ed8">
  <title>重庆加油优惠情报站</title>
  <script>window.APP_BUILD = '2025052604';</script>
  <script>
  (function () {
    var BUILD = window.APP_BUILD;
    var isLocal = location.protocol === 'file:'
      || location.hostname === 'localhost'
      || location.hostname === '127.0.0.1';
    var GITHUB_REPO = 'https://cdn.jsdelivr.net/gh/yuanjunfeng199072/cq-gas-helper-222@main/';
    var tz = '';
    try {
      tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    } catch (e) { /* ignore */ }

    // 仅在线上 GitHub Pages 且大陆网络时走 jsDelivr；本地直接打开 html 始终用本地文件
    var isMainland = !isLocal && (
      ['Asia/Shanghai', 'Asia/Chongqing', 'Asia/Urumqi', 'Asia/Harbin'].indexOf(tz) >= 0
      || /^zh(-cn)?$/i.test(navigator.language || '')
    );

    if (isMainland && !document.querySelector('base[data-cdn]')) {
      var base = document.createElement('base');
      base.href = GITHUB_REPO;
      base.setAttribute('data-cdn', 'jsdelivr');
      document.head.insertBefore(base, document.head.firstChild);
    }

    if (isLocal) return;

    try {
      var key = 'cq_gas_build';
      var prev = localStorage.getItem(key);
      if (prev && prev !== BUILD) {
        localStorage.setItem(key, BUILD);
        var url = new URL(location.href);
        if (url.searchParams.get('v') !== BUILD) {
          url.searchParams.set('v', BUILD);
          location.replace(url.href);
        }
      } else {
        localStorage.setItem(key, BUILD);
      }
    } catch (err) { /* ignore */ }
  })();
  </script>
  <link rel="stylesheet" href="css/style.css?v=2025052604">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://webapi.amap.com">
</head>
<body>
  <div class="app">
    <!-- 顶部：品牌 + 目的地 -->
    <header class="top-bar">
      <div class="top-bar-row">
        <div class="brand">
          <span class="brand-icon">⛽</span>
          <span class="brand-name">重庆加油优惠情报站</span>
        </div>
        <span class="loc-badge" id="location-badge">定位中</span>
      </div>
      <div class="dest-bar-wrap">
        <div class="dest-bar">
          <input type="text" id="destination-input" class="dest-input" placeholder="输入目的地，查顺路最省" maxlength="50" autocomplete="off" aria-autocomplete="list" aria-controls="dest-suggestions" aria-expanded="false">
          <button type="button" id="route-search-btn" class="dest-btn" title="顺路分析">顺路</button>
        </div>
        <ul id="dest-suggestions" class="dest-suggestions hidden" role="listbox"></ul>
      </div>
      <div class="loc-row">
        <p class="loc-text" id="location-name">定位中...</p>
        <button type="button" id="locate-btn" class="loc-btn">定位</button>
      </div>
    </header>

    <!-- 地图主区域 -->
    <section class="map-wrap">
      <div id="map-container" class="map-container">
        <div id="map-placeholder" class="map-placeholder">地图加载中...</div>
      </div>
      <div id="route-result" class="route-chip hidden"></div>
      <button type="button" id="fit-liangjiang-btn" class="map-district-btn" title="查看两江新区站点">两江新区</button>
    </section>

    <!-- 底部操作栏 -->
    <nav class="bottom-bar">
      <button type="button" class="bottom-btn bottom-btn-primary" id="toggle-rank-btn">
        <span class="bottom-btn-icon">📊</span>
        <span>附近优惠排行</span>
      </button>
      <button type="button" class="bottom-btn" id="feedback-btn">
        <span class="bottom-btn-icon">💬</span>
        <span>意见反馈</span>
      </button>
    </nav>

    <!-- 排行榜抽屉 -->
    <div id="rank-sheet" class="rank-sheet" aria-hidden="true">
      <div class="sheet-handle" id="sheet-handle"></div>
      <div class="sheet-header">
        <h2 class="sheet-title">附近优惠排行</h2>
        <button type="button" class="sheet-close" id="sheet-close" aria-label="关闭">×</button>
      </div>
      <div class="rank-fuel-tabs">
        <button type="button" class="rank-fuel-tab active" data-fuel="92">92# 每升节约</button>
        <button type="button" class="rank-fuel-tab" data-fuel="95">95# 每升节约</button>
      </div>
      <ol id="rank-list" class="rank-list"></ol>
      <p class="sheet-subtitle">全部站点</p>
      <div id="station-list" class="station-list"></div>
    </div>
    <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>

    <div id="loading" class="loading-overlay">
      <div class="loading-spinner"></div>
      <p>正在加载优惠情报...</p>
    </div>
  </div>

  <script src="data/stations-data.js?v=2025052604"></script>
  <script src="js/config.js?v=2025052604"></script>
  <script src="js/utils.js?v=2025052604"></script>
  <script src="js/map.js?v=2025052604"></script>
  <script src="js/route.js?v=2025052604"></script>
  <script src="js/app.js?v=2025052604"></script>
</body>
</html>
